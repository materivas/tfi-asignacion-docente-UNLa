spring.application.name=backend

# Configuraci�n de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/asignacionDocente
spring.datasource.username=postgres
spring.datasource.password=123456

# Mostrar las consultas SQL por consola
spring.jpa.show-sql=true

# Crear o actualizar automaticamente las tablas segun las entidades
#spring.jpa.hibernate.ddl-auto=update

# Opcional: usar dialecto espec�fico para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuraci�n de Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

#logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuración para ejecutar script de datos iniciales
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql