spring.application.name=backend

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/asignacionDocente
spring.datasource.username=postgres
spring.datasource.password=root

# Show SQL queries in console
spring.jpa.show-sql=true

# Create or update tables automatically according to entities
spring.jpa.hibernate.ddl-auto=update

# Optional: use specific dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# HTTPS and static resources configuration
server.ssl.enabled=false
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/,classpath:/public/

# Logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Initial data script configuration
spring.jpa.defer-datasource-initialization=true
# Change to 'always' to execute data.sql on each startup, 'never' to disable
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql

# Email configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
