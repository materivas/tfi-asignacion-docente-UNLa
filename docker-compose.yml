services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: gestion-docentes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asignacionDocente
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestion-docentes-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/asignacionDocente
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_SQL_INIT_MODE: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ---- Vite / React Frontend (nginx) ----
  frontend:
    build:
      context: ./vite-frontend
      dockerfile: Dockerfile
    container_name: gestion-docentes-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
